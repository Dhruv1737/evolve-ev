<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EVOLVE — India's premier electric vehicle conclave. Vidyut 26, NIT Bhopal." />
    <meta property="og:title" content="EVOLVE — Vidyut 26" />
    <meta property="og:description" content="Sustainable Luxury. Electric Future." />
    <meta property="og:image" content="https://evolve.nitb.in/Evolve_Logo.png" />
    <title>EVOLVE — Vidyut 26</title>

    <!-- Font Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Archivo:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        background: #121214;
        overflow-x: hidden;
      }

      /* ── Loader ── */
      #loader {
        position: fixed;
        inset: 0;
        background: #121214;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.8s ease, visibility 0.8s ease;
        gap: 32px;
      }

      #loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      #loader-logo {
        width: 80px;
        opacity: 0;
        animation: loaderFadeIn 0.6s ease 0.2s forwards;
      }

      #loader-wordmark {
        font-family: 'Cormorant Garamond', serif;
        font-size: 0.75rem;
        font-weight: 400;
        letter-spacing: 0.5em;
        color: #B87333;
        text-transform: uppercase;
        opacity: 0;
        animation: loaderFadeIn 0.6s ease 0.5s forwards;
      }

      #loader-bar-wrap {
        width: 120px;
        height: 1px;
        background: rgba(184,115,51,0.15);
        overflow: hidden;
        opacity: 0;
        animation: loaderFadeIn 0.3s ease 0.7s forwards;
      }

      #loader-bar-fill {
        height: 100%;
        background: #B87333;
        animation: loaderFill 1.6s cubic-bezier(0.25,0.46,0.45,0.94) 0.8s forwards;
        width: 0%;
      }

      @keyframes loaderFadeIn {
        to { opacity: 1; }
      }
      @keyframes loaderFill {
        to { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <img id="loader-logo" src="https://evolve.nitb.in/Evolve_Logo.png" alt="EVOLVE" />
      <div id="loader-wordmark">Evolve &nbsp;·&nbsp; Vidyut 26</div>
      <div id="loader-bar-wrap">
        <div id="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('loader');
          if (loader) loader.classList.add('hidden');
        }, 2400);
      });
    </script>
  </body>
</html>
